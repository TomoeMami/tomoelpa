name: Scheduled empty commit

on:
  schedule:
    # 每天 UTC 00:00 触发（北京时间 08:00）
    # 你可以根据需要修改 cron 表达式
    - cron: '22 18 * * *'
  workflow_dispatch:
jobs:
  empty-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 授予 GITHUB_TOKEN 基本写入权限，但实际推送会使用 PAT

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # 使用 PAT 而不是默认的 GITHUB_TOKEN
          token: ${{ secrets.PAT_TOKEN }}

      - name: Configure Git bot identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Pull latest changes (avoid conflicts)
        run: git pull --rebase origin main

      - name: Create empty commit
        run: |
          git commit --allow-empty -m "chore: trigger rebuild via scheduled empty commit"

      - name: Push to main
        # 使用 PAT 进行推送，推送会触发新的 push 事件
        run: git push origin main
