name: Build elpa
on:
  push:
    branches: main
  workflow_dispatch:
jobs:
  build:
    name: Build elpa
    runs-on: ubuntu-26.04
    permissions:
      contents: read
    steps:
      - name: Fetch recipes
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Cache sources
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          key: sources
          path: sources
      - name: Build elpa
        uses: melpa/package-build@f19a7f58cf4b2e573a6d551d8d3dbe265c2566b4 # v5
        env:
          ELPA_NAME: MyElpa
          ELPA_STEM: myelpa
          ELPA_URL: ${{ github.event.repository.homepage }}
          REPO_URL: ${{ github.event.repository.html_url }}
          WIKI_URL: ${{ github.event.repository.html_url }}/wiki
        with:
          args: build-channels page
      - name: Upload page
        id: page
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: archives
  deploy:
    name: Deploy elpa
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.page.outputs.page_url }}
    steps:
      - name: Deploy elpa
        id: page
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
